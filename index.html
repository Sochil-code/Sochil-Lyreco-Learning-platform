body{font-family:'Segoe UI',Roboto,-apple-system,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-text-size-adjust:100%}

.logo{font-weight:800;font-size:18px;color:var(--blue);letter-spacing:.3px;line-height:1}
.logo span{color:var(--orange)}

.cta{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn{border:0;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

.btn.lt{background:#fff;color:var(--blue);border:1px solid var(--line)}

.scale{display:flex;border-radius:10px;overflow:hidden;margin:10px 0;font-size:10.5px;color:#fff;text-align:center;font-weight:600}

.sinner svg{width:124px;height:124px;flex-shrink:0}
.sinner ul{list-style:none;font-size:13px;display:flex;flex-direction:column;gap:6px;min-width:200px;flex:1}

.tech{background:#eef3fb;border-left:3px solid var(--blue);padding:8px 11px;border-radius:7px}

details.more[open] summary::before{content:"▴ ";}

#toasts{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:#16202e;color:#fff;border-radius:10px;padding:10px 16px;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.25)}

/* ============ UI HELPERS ============ */
function toast(m,t){const c=document.getElementById('toasts');if(!c)return;const e=document.createElement('div');e.className='toast '+(t||'');e.textContent=m;c.appendChild(e);setTimeout(()=>e.remove(),3000);}
const COBRAND={on:true,name:"Lyreco"};
function initCobrand(){const el=document.getElementById('cobrand');if(el)el.hidden=!COBRAND.on;}

/* ============ PRODUCT CARD ============ */
/* ==== sinonimi superfici (espansione indice ricerca) ==== */
const SYN={"gres":"grès porcellanato piastrelle piastrella mattonelle mattonella monocottura bicottura ceramica tecnica pavimento ceramico porcellanato tecnico grès fine","ceramica":"piastrelle piastrella mattonelle maiolica smaltato ceramico rivestimento ceramico","klinker":"clinker gres estruso cotto ceramico","marmo":"marmi marmoreo marmette botticino carrara calacatta perlato","granito":"granitico graniti granito lucidato","travertino":"travertini","ardesia":"lavagna ardesie slate pietra di lavagna","porfido":"porfidi porfidico cubetti di porfido","pietra":"pietre pietra naturale pietra serena pietra di trani beola luserna quarzite arenaria sasso sassi ciottolato acciottolato","cotto":"terracotta laterizio cotto toscano cotto fatto a mano cotto smaltato pianelle","graniglia":"granigliato seminato terrazzo alla veneziana palladiana veneziana marmette cementine","terrazzo":"seminato palladiana veneziana granigliato","pvc":"vinile vinilico vinilici lvt teli vinilici pavimento vinilico pvc omogeneo pvc eterogeneo gerflor tarkett","vinile":"vinilico vinilici lvt","linoleum":"lino marmoleum linoleum naturale","gomma":"caucciù gomma pastigliata gomma bollonata pavimento in gomma tappeti in gomma","cemento":"calcestruzzo cementizio cementizia massetto cemento al quarzo cemento spatolato cemento stampato pavimento industriale sottofondo battuto di cemento","resina":"resine epossidica epossidico epossidiche poliuretanico poliuretanica resinoso pavimento resinoso autolivellante spatolato","microcemento":"micro cemento cemento spatolato","acciaio inox":"inox inossidabile acciaio inossidabile steel","acciaio":"inox inossidabile steel","alluminio":"allumino leghe leggere anticorodal alluminio anodizzato profili in alluminio serramenti in alluminio","ferro":"ghisa ferroso ferrose","rame":"ottone bronzo leghe di rame ramato ottonato","cromat":"cromo cromato cromata cromature rubinetteria rubinetti miscelatori acciaio cromato","rubinett":"rubinetti rubinetteria miscelatori cromature cromo","vetro":"vetri cristallo cristalli vetrata vetrate superfici vetrate lastre di vetro pareti vetrate","specchi":"specchio specchiere superfici specchiate","legno":"ligneo tavolato legname doghe superfici in legno essenza lignea","parquet":"listoni doghe pavimento in legno prefinito","laminato":"laminati melaminico nobilitato","plastic":"plastiche plastica superfici plastiche materie plastiche","plexiglass":"policarbonato metacrilato pmma perspex vetro acrilico","sanitari":"wc water vater bidet lavabo lavandino lavandini orinatoi vespasiani ceramica sanitaria tazza wc turche","box doccia":"doccia piatto doccia cabina doccia box docce","piastrelle":"mattonelle rivestimenti piastrella","infissi":"serramenti finestre telai davanzali","vasche":"vasca vasca da bagno vaschette","banconi":"banco bancone banchi bancone bar espositori vetrine","piani":"piano di lavoro piani di lavoro top ripiani superfici di lavoro","pavimenti":"pavimento pavimentazione pavimentazioni"};
function pcardHTML(k){const p=P[k];
 const cli=(p.clienti||'').replace(/\([^)]*\)/g,' ').replace(/[^.;,]*esclus[^.;,]*/gi,' ');
 let s=(p.n+' '+p.s+' '+cli+' '+(CATS[p.cat]?CATS[p.cat].name:'')+' '+(APP[k]||'')+' '+(SFC[k]?SFC[k].ok+' '+SFC[k].soil:'')).toLowerCase().replace(/"/g,'');if(SFC[k]){const okl=SFC[k].ok.toLowerCase();for(const sk in SYN){if(okl.indexOf(sk)>=0)s+=' '+SYN[sk];}}
 const dt=[`<span><b>Aspetto:</b> ${p.asp}</span>`,`<span><b>pH:</b> ${phLabel(p.ph)}</span>`,p.dens?`<span><b>Densità:</b> ${p.dens}</span>`:'',p.bio?`<span><b>Biodegr.:</b> ${p.bio}</span>`:'',`<span><b>Validità:</b> ${p.val}</span>`,`<span><b>Formati:</b> ${p.fmt}</span>`].join('');
 return `<div class="pcard" data-s="${s}" data-cat="${p.cat}" data-ph="${phClass(p.ph)}" data-reg="${p.reg?'pmc':''}">
  <div class="pc-h"><div class="pthumb"><img src="${k}.jpg" alt="${p.n}" loading="lazy" onerror="if(!this.dataset.f){this.dataset.f=1;this.src='img/${k}.jpg'}else{this.remove()}"></div><div><div class="nm">${p.n}</div><div class="sb">${p.s}</div></div><span class="ph ${phClass(p.ph)}">${phLabel(p.ph)}</span></div>
  <div class="pc-b">
   <div class="appline"><b>Modo d'uso:</b> ${APP[k]||p.how}</div>
   ${SFC[k]?`<div class="kv sfc"><b>Superfici consigliate:</b> ${SFC[k].ok}</div><div class="kv rem"><b>Rimuove:</b> ${SFC[k].soil}</div>`:''}
   <div class="kv"><b>A chi serve:</b> ${p.clienti}</div>
   <div class="sell"><b>Perché si vende.</b> ${p.sell}</div>
   ${SFC[k]&&SFC[k].no?`<div class="warn"><b>Non usare su.</b> ${SFC[k].no}</div>`:''}
   ${p.warn?`<div class="warn"><b>Attenzione.</b> ${p.warn}</div>`:''}
   <details class="more"><summary>Dettagli e uso</summary><img class="pbig" src="${k}.jpg" alt="${p.n}" loading="lazy" onerror="if(!this.dataset.f){this.dataset.f=1;this.src='img/${k}.jpg'}else{this.remove()}">
    <div class="kv" style="margin-top:8px"><b>Dove/uso:</b> ${p.use}</div>
    <div class="kv"><b>Come si usa:</b> ${p.how}</div>
    <div class="kv"><b>Composizione:</b> ${p.comp}</div>
    ${p.reg?`<div class="kv"><b>Registrazione:</b> ${p.reg}</div>`:''}
    ${p.tech?`<div class="tech"><b>Nota tecnica.</b> ${p.tech}</div>`:''}
    <div class="dt">${dt}</div>
   </details>
  </div></div>`;
}

/* ============ RICERCA ============ */
let activeFilter='all';
function setFilter(el){document.querySelectorAll('#catfilters .fchip').forEach(c=>c.classList.remove('active'));el.classList.add('active');activeFilter=el.dataset.f;applyFilters();}
function stem(w){return w.length>4?w.replace(/[aeiou]$/,""):w;}
function matchSearch(sd,q){var words=sd.split(/[^0-9a-zàèéìòù]+/);return q.split(/\s+/).filter(Boolean).every(function(w){var st=stem(w);return words.some(function(x){return x&&x.indexOf(st)===0;});});}
function applyFilters(){const inp=document.getElementById('gsearch');const q=(inp?inp.value:'').toLowerCase().trim();let n=0;
 document.querySelectorAll('#prodlist .pcard').forEach(d=>{let ok=true;
  if(activeFilter&&activeFilter!=='all'){const pr=activeFilter.split(':'),k=pr[0],v=pr[1];if(k==='cat')ok=d.dataset.cat===v;else if(k==='ph')ok=d.dataset.ph===v;else if(k==='reg')ok=d.dataset.reg==='pmc';}
  if(ok&&q)ok=matchSearch(d.dataset.s,q);d.style.display=ok?'':'none';if(ok)n++;});
 const sc=document.getElementById('searchcount');if(sc)sc.textContent=n+' prodotti su '+Object.keys(P).length;}

/* ============ PAGINE ============ */
function page_home(){
 let cards=`<div class="mcard fond" onclick="go('fond')"><div class="ic">${ICONS.fond}</div><div class="mt">Fondamentali</div><div class="mm">Chimica + metodo, in pillole</div></div>`;
 MODULES.filter(m=>m.cat).forEach(m=>{cards+=`<div class="mcard" onclick="go('${m.id}')"><div class="ic">${ICONS[m.id]||m.ic}</div><div class="mt">${m.t}</div><div class="mm">${prodsOf(m.cat).length} prodotti</div></div>`;});
 cards+=`<div class="mcard search" onclick="go('cerca')"><div class="ic">${ICONS.cerca}</div><div class="mt">Cerca prodotto</div><div class="mm">Trova al volo tra i 34</div></div>`;
 return `<div class="home-hero"><h1>Conosci la gamma Sochil, vendi con competenza.</h1>
  <div class="cta"><button class="btn pri" onclick="go('fond')">Vai ai Fondamentali</button><button class="btn ghost" onclick="go('cerca')">Cerca un prodotto</button></div></div>
  <div class="sec-t">La gamma per famiglia</div>
  <div class="mgrid">${cards}</div>`;
}
function page_fond(){let h=`<button class="back" onclick="go('home')">← Home</button>
 <h2 class="pg">Fondamentali</h2><p class="lead">Le basi di chimica e di metodo, in pillole e con i tuoi prodotti. Bastano 10 minuti per capire <i>perché</i> ogni prodotto funziona.</p><div class="card">`;
 FOND.forEach(s=>{h+=`<h3>${s.h}</h3><p>${s.b}</p>${s.scale?scaleHTML:''}${s.sinner?sinnerHTML:''}`;});
 h+=`</div>`;return h;}
function page_fam(m){let h=`<button class="back" onclick="go('home')">← Home</button>
 <h2 class="pg">${m.t}</h2><div class="card"><p>${FAMI[m.cat]}</p></div>
 <div class="sec-t">${prodsOf(m.cat).length} prodotti · tocca &laquo;Dettagli e uso&raquo; per la scheda completa</div>
 <div id="prodlist">`;
 prodsOf(m.cat).forEach(k=>h+=pcardHTML(k));h+=`</div>`;return h;}
function page_cerca(){activeFilter='all';
 let chips=`<span class="fchip active" data-f="all" onclick="setFilter(this)">Tutte (${Object.keys(P).length})</span>`;
 Object.keys(CATS).forEach(c=>chips+=`<span class="fchip" data-f="cat:${c}" onclick="setFilter(this)">${CATS[c].name}</span>`);
 chips+=`<span class="fchip" data-f="ph:acid" onclick="setFilter(this)">Acidi</span><span class="fchip" data-f="ph:neu" onclick="setFilter(this)">Neutri</span><span class="fchip" data-f="ph:alk" onclick="setFilter(this)">Alcalini</span><span class="fchip" data-f="reg:pmc" onclick="setFilter(this)">PMC</span>`;
 let h=`<button class="back" onclick="go('home')">← Home</button><h2 class="pg">Cerca e consulta</h2>
  <p class="lead">Digita un nome, un tipo di sporco ("calcare", "grasso", "inchiostro"), una superficie o un ambiente. Oppure filtra.</p>
  <input class="search-in" id="gsearch" placeholder="Cerca per nome, sporco, superficie, cliente..." oninput="applyFilters()">
  <div class="filters" id="catfilters">${chips}</div><div id="searchcount" class="lead" style="margin:6px 4px"></div><div id="prodlist">`;
 Object.keys(P).forEach(k=>h+=pcardHTML(k));h+=`</div>`;return h;}

/* ============ ROUTER ============ */
let current="home";
function go(id){current=id;const m=MODULES.find(x=>x.id===id);let html='';
 if(id==='home')html=page_home();
 else if(id==='fond')html=page_fond();
 else if(id==='cerca')html=page_cerca();
 else if(m&&m.cat)html=page_fam(m);
 const main=document.getElementById('main');main.innerHTML=html;
 if(id!=='home'&&id!=='cerca'){const i=NAVSEQ.indexOf(id);const pid=i>0?NAVSEQ[i-1]:null,nid=i>=0&&i<NAVSEQ.length-1?NAVSEQ[i+1]:null;
  const lab=x=>MODULES.find(m=>m.id===x).t;
  main.insertAdjacentHTML('beforeend',`<div class="modnav"><button ${pid?'':'disabled'} ${pid?`onclick="go('${pid}')"`:''}><span class="s">← Precedente</span>${pid?lab(pid):'—'}</button><button class="nx" ${nid?'':'disabled'} ${nid?`onclick="go('${nid}')"`:''}><span class="s">Successivo →</span>${nid?lab(nid):'—'}</button></div>`);}
 window.scrollTo(0,0);}
go('home');initCobrand();
</script>
